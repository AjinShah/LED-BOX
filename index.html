<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskMate Controller</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-color: #f8fafc;
            --border-color: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }
        h2 {
            margin-top: 0;
            text-align: center;
            font-weight: 700;
        }
        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
            transition: opacity 0.2s;
        }
        .btn:active {
            opacity: 0.8;
        }
        .btn-disconnect {
            background-color: #ef4444;
        }
        .status-bar {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .menu-item {
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu-item i {
            font-size: 20px;
            color: #94a3b8;
        }
        .menu-item.active {
            border-color: var(--accent-color);
            background: rgba(59, 130, 246, 0.1);
        }
        .menu-item.active i {
            color: var(--accent-color);
        }
        .menu-item span {
            font-size: 11px;
            font-weight: 500;
            color: #94a3b8;
        }
        .menu-item.active span {
            color: var(--text-color);
        }
        .config-section {
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
        }
        .config-section.visible {
            display: block;
        }
        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            background: #1e293b;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .flex-row {
            display: flex;
            gap: 8px;
        }
        .flex-row .btn {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DeskMate Portal</h2>
    <button id="connectBtn" class="btn"><i class="fa-solid fa-bluetooth"></i> Connect Device</button>
    <div id="status" class="status-bar">Status: Disconnected</div>

    <!-- Application Selection Grid -->
    <div class="grid-menu">
        <div class="menu-item active" onclick="switchMode(0, 'clockPanel')">
            <i class="fa-regular fa-clock"></i>
            <span>Clock</span>
        </div>
        <div class="menu-item" onclick="switchMode(1, 'datePanel')">
            <i class="fa-regular fa-calendar"></i>
            <span>Calendar</span>
        </div>
        <div class="menu-item" onclick="switchMode(2, 'textPanel')">
            <i class="fa-solid fa-font"></i>
            <span>Text Msg</span>
        </div>
        <div class="menu-item" onclick="switchMode(4, 'weatherPanel')">
            <i class="fa-solid fa-cloud-sun-rain"></i>
            <span>Weather</span>
        </div>
        <div class="menu-item" onclick="switchMode(5, 'timerPanel')">
            <i class="fa-solid fa-hourglass-half"></i>
            <span>Timer</span>
        </div>
        <div class="menu-item" onclick="switchMode(3, 'blankPanel')">
            <i class="fa-solid fa-moon"></i>
            <span>Sleep</span>
        </div>
    </div>

    <!-- Clock Control Module -->
    <div id="clockPanel" class="config-section visible">
        <label>System Color</label>
        <input type="color" id="systemColor" value="#00ff64" style="width:100%; height:40px; border:none; background:none; cursor:pointer;" oninput="updateColor(this.value)">
        <br><br>
        <label>Panel Brightness</label>
        <input type="range" min="5" max="150" value="35" style="width:100%;" oninput="updateBrightness(this.value)">
    </div>

    <!-- Calendar Module -->
    <div id="datePanel" class="config-section">
        <label>Calendar Sync</label>
        <p style="margin: 0; color: #94a3b8; font-size: 13px;">Synchronizes local date automatically when active.</p>
    </div>

    <!-- Text Module (Corrected layout: Only appears when Text tab is active) -->
    <div id="textPanel" class="config-section">
        <label>Custom Ticker Text</label>
        <input type="text" id="scrollTextInput" placeholder="Enter message text...">
        <button class="btn" onclick="sendScrollText()"><i class="fa-solid fa-paper-plane"></i> Push to Screen</button>
    </div>

    <!-- Weather Module -->
    <div id="weatherPanel" class="config-section">
        <label>Temperature Descriptor</label>
        <input type="text" id="weatherTemp" value="+25C kochi" placeholder="Format example: +25C kochi">
        <button class="btn" onclick="sendWeather()"><i class="fa-solid fa-cloud-sun"></i> Send Weather</button>
    </div>

    <!-- Timer Module -->
    <div id="timerPanel" class="config-section">
        <label>Timer Duration (Minutes)</label>
        <input type="number" id="timerMinutes" value="10" min="1" max="999">
        <div class="flex-row">
            <button class="btn" onclick="controlTimer(1)"><i class="fa-solid fa-hourglass-start"></i> Set Time</button>
            <button class="btn" style="background-color: #22c55e;" onclick="controlTimer(2)"><i class="fa-solid fa-play"></i> Start</button>
        </div>
        <div class="flex-row" style="margin-top: 8px;">
            <button class="btn" style="background-color: #eab308;" onclick="controlTimer(3)"><i class="fa-solid fa-pause"></i> Pause</button>
            <button class="btn" style="background-color: #ef4444;" onclick="controlTimer(4)"><i class="fa-solid fa-rotate-left"></i> Reset</button>
        </div>
    </div>

    <!-- Sleep Module -->
    <div id="blankPanel" class="config-section">
        <label>Standby Mode</label>
        <p style="margin:0; color: #94a3b8; font-size: 13px;">Hardware rendering pipeline paused.</p>
    </div>
</div>

<script>
const SERVICE_UUID = "4fa10001-e89b-4a9e-912c-21a7420896aa";
const CHARACTERISTIC_UUID = "4fa10002-e89b-4a9e-912c-21a7420896aa";

let bleDevice = null;
let bleChar = null;

document.getElementById('connectBtn').addEventListener('click', async () => {
    if (bleDevice && bleDevice.gatt.connected) {
        await bleDevice.gatt.disconnect();
        onDisconnected();
        return;
    }

    try {
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ services: [SERVICE_UUID] }],
            optionalServices: [SERVICE_UUID]
        });

        document.getElementById('status').innerText = "Connecting...";
        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        bleChar = await service.getCharacteristic(CHARACTERISTIC_UUID);

        document.getElementById('status').innerText = "Connected to DeskMate";
        document.getElementById('connectBtn').innerHTML = '<i class="fa-solid fa-unlink"></i> Disconnect';
        document.getElementById('connectBtn').classList.add('btn-disconnect');
        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        // Immediate Auto RTC Synchronization without user interaction
        await syncRtcClock();

    } catch (err) {
        console.error(err);
        document.getElementById('status').innerText = "Connection Failed";
    }
});

function onDisconnected() {
    bleDevice = null;
    bleChar = null;
    document.getElementById('status').innerText = "Disconnected";
    document.getElementById('connectBtn').innerHTML = '<i class="fa-solid fa-bluetooth"></i> Connect Device';
    document.getElementById('connectBtn').classList.remove('btn-disconnect');
}

async function writeBLE(arrayBuffer) {
    if (!bleChar) return;
    try {
        await bleChar.writeValueWithoutResponse(arrayBuffer);
    } catch (e) {
        console.error("Write error:", e);
    }
}

async function syncRtcClock() {
    const now = new Date();
    const packet = new Uint8Array([
        0x04,
        now.getHours(),
        now.getMinutes(),
        now.getSeconds()
    ]);
    await writeBLE(packet);
}

async function switchMode(modeId, panelId) {
    // UI Panel switching state
    document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('.config-section').forEach(sec => sec.classList.remove('visible'));
    
    event.currentTarget.classList.add('active');
    document.getElementById(panelId).classList.add('visible');

    const packet = new Uint8Array([0x03, modeId]);
    await writeBLE(packet);
}

async function updateColor(hexColor) {
    const r = parseInt(hexColor.substr(1, 2), 16);
    const g = parseInt(hexColor.substr(3, 2), 16);
    const b = parseInt(hexColor.substr(5, 2), 16);
    const packet = new Uint8Array([0x01, r, g, b]);
    await writeBLE(packet);
}

async function updateBrightness(val) {
    const packet = new Uint8Array([0x02, parseInt(val)]);
    await writeBLE(packet);
}

async function sendScrollText() {
    const textVal = document.getElementById('scrollTextInput').value;
    const encoder = new TextEncoder();
    const rawStrBytes = encoder.encode(textVal);
    const packet = new Uint8Array(1 + rawStrBytes.length);
    packet[0] = 0x06;
    packet.set(rawStrBytes, 1);
    await writeBLE(packet);
}

async function sendWeather() {
    const weatherString = document.getElementById('weatherTemp').value;
    const encoder = new TextEncoder();
    const textBytes = encoder.encode(weatherString);
    const packet = new Uint8Array(2 + textBytes.length);
    packet[0] = 0x07;
    packet[1] = 0x01; // Sun + Cloud condition layer mask identifier
    packet.set(textBytes, 2);
    await writeBLE(packet);
}

async function controlTimer(actionCode) {
    const totalMinutes = parseInt(document.getElementById('timerMinutes').value) || 0;
    const minHigh = (totalMinutes >> 8) & 0xFF;
    const minLow = totalMinutes & 0xFF;
    const packet = new Uint8Array([0x08, actionCode, minHigh, minLow, 0x00]); // [0x08, action, minsMSB, minsLSB, secs]
    await writeBLE(packet);
}
</script>
</body>
</html>
