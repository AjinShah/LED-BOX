<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskMate Premium Control</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-grad-start: #060b19;
            --bg-grad-end: #0c152b;
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(59, 130, 246, 0.5);
            --neon-blue: #3b82f6;
            --neon-green: #10b981;
            --neon-orange: #f59e0b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }
        
        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top, #111a36 0%, var(--bg-grad-start) 70%, var(--bg-grad-end) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 410px;
            background: linear-gradient(145deg, #131e3a, #0b1122);
            border-radius: 40px;
            padding: 10px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.8), 
                        inset 0 2px 4px rgba(255, 255, 255, 0.1);
            border: 4px solid #1e293b;
        }

        .screen {
            background: #080d1a;
            border-radius: 32px;
            padding: 24px 20px;
            overflow-y: auto;
            max-height: 820px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hardware 3D Mockup Container */
        .device-mockup-container {
            perspective: 800px;
            margin-bottom: 24px;
        }

        .device-mockup {
            width: 100%;
            height: 110px;
            background: linear-gradient(135deg, #2a2f3d 0%, #151821 100%);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 
                        0 0 25px rgba(59, 130, 246, 0.15);
            transform: rotateX(12deg) rotateY(-8deg);
            transform-style: preserve-3d;
            position: relative;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s ease;
        }

        .device-mockup:hover {
            transform: rotateX(6deg) rotateY(-3deg);
        }

        /* Matrix Display Screen Emulation */
        .matrix-screen-emulation {
            width: 100%;
            height: 64px;
            background: #04060b;
            border-radius: 6px;
            border: 2px solid #2d3748;
            box-shadow: inset 0 0 10px #000;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        .matrix-led-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.7) 100%),
                        repeating-linear-gradient(90deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 3px, rgba(0,0,0,0.5) 4px),
                        repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 3px, rgba(0,0,0,0.5) 4px);
            pointer-events: none;
            z-index: 10;
        }

        /* Clock State inside Mockup */
        .mockup-clock {
            font-family: monospace;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
            margin: 0 auto;
            display: block;
        }

        /* Weather State inside Mockup */
        .mockup-weather-wrapper {
            display: none;
            align-items: center;
            width: 100%;
            gap: 12px;
        }

        .mockup-weather-icon {
            font-size: 20px;
            color: #f59e0b;
            animation: float 3s ease-in-out infinite;
        }

        .mockup-weather-text {
            font-family: monospace;
            font-size: 15px;
            white-space: nowrap;
            color: #fff;
            animation: scrollMockupWeather 8s linear infinite;
        }

        /* Timer State inside Mockup */
        .mockup-timer-wrapper {
            display: none;
            flex-direction: column;
            width: 100%;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .mockup-timer-digits {
            font-family: monospace;
            font-size: 24px;
            color: #fff;
            text-shadow: 0 0 6px #fff;
        }

        .mockup-timer-progress-bg {
            width: 90%;
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            overflow: hidden;
        }

        .mockup-timer-progress-fill {
            width: 100%;
            height: 100%;
            background: #00b4ff;
            box-shadow: 0 0 5px #00b4ff;
            transition: width 1s linear;
        }

        @keyframes scrollMockupWeather {
            0% { transform: translateX(100px); }
            100% { transform: translateX(-120px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* Connection / Controller Cards */
        .control-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px;
            backdrop-filter: blur(12px);
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .menu-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item i {
            font-size: 20px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .menu-item.active {
            border-color: var(--neon-blue);
            background: rgba(59, 130, 246, 0.15);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
            transform: scale(1.03);
        }

        .menu-item.active i {
            color: var(--neon-blue);
        }

        .menu-item span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .menu-item.active span {
            color: var(--text-primary);
        }

        /* Configuration Sections */
        .config-section {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .config-section.visible {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color, #334155);
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--neon-blue);
        }

        .btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-disconnect {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-secondary {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--glass-border);
            box-shadow: none;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        /* Sliders / Color pickers */
        .slider-wrapper {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #334155;
            height: 6px;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #ef4444;
        }

        .status-dot.connected {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>
<body>

<div class="phone-wrapper">
    <div class="screen">
        
        <!-- Header Controls -->
        <div class="header">
            <h1>DeskMate Portal</h1>
            <div style="display: flex; align-items: center; font-size: 12px; color: var(--text-secondary);">
                <span id="statusIndicator" class="status-dot"></span>
                <span id="statusText">Offline</span>
            </div>
        </div>

        <!-- Dynamic Live Render 3D Mockup -->
        <div class="device-mockup-container">
            <div class="device-mockup">
                <div class="matrix-screen-emulation">
                    <div class="matrix-led-overlay"></div>
                    
                    <!-- Emulated Clock Visual Screen -->
                    <div id="mockupClock" class="mockup-clock">12:00</div>
                    
                    <!-- Emulated Weather Visual Screen -->
                    <div id="mockupWeather" class="mockup-weather-wrapper">
                        <i class="fa-solid fa-cloud-sun mockup-weather-icon"></i>
                        <span id="mockupWeatherLabel" class="mockup-weather-text">+25C kochi</span>
                    </div>

                    <!-- Emulated Timer Visual Screen (Centered Timer + Progress Bar) -->
                    <div id="mockupTimer" class="mockup-timer-wrapper">
                        <div id="mockupTimerDigits" class="mockup-timer-digits">00:00</div>
                        <div class="mockup-timer-progress-bg">
                            <div id="mockupTimerProgress" class="mockup-timer-progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Connection Base Handler -->
        <button id="connectBtn" class="btn" style="margin-bottom: 20px;">
            <i class="fa-solid fa-bluetooth"></i> Initialize Connection
        </button>

        <!-- System Application Navigation Control Grid -->
        <div class="grid-menu">
            <div class="menu-item active" onclick="switchMode(0, 'clockPanel')">
                <i class="fa-regular fa-clock"></i>
                <span>Clock</span>
            </div>
            <div class="menu-item" onclick="switchMode(1, 'datePanel')">
                <i class="fa-regular fa-calendar"></i>
                <span>Calendar</span>
            </div>
            <div class="menu-item" onclick="switchMode(2, 'textPanel')">
                <i class="fa-solid fa-font"></i>
                <span>Message</span>
            </div>
            <div class="menu-item" onclick="switchMode(4, 'weatherPanel')">
                <i class="fa-solid fa-cloud-sun-rain"></i>
                <span>Weather</span>
            </div>
            <div class="menu-item" onclick="switchMode(5, 'timerPanel')">
                <i class="fa-solid fa-hourglass-half"></i>
                <span>Timer</span>
            </div>
            <div class="menu-item" onclick="switchMode(3, 'blankPanel')">
                <i class="fa-solid fa-moon"></i>
                <span>Sleep</span>
            </div>
        </div>

        <!-- Parameter Configuration Cards -->
        <div class="control-card">
            
            <!-- Clock Settings -->
            <div id="clockPanel" class="config-section visible">
                <label>Voxel Display Color</label>
                <div class="slider-wrapper" style="display: flex; align-items: center; gap: 12px;">
                    <input type="color" id="systemColor" value="#00ff64" style="border: none; width: 50px; height: 40px; border-radius: 8px; background: none; cursor: pointer;" oninput="updateColor(this.value)">
                    <span style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">Select custom color hex</span>
                </div>
                
                <label>Hardware Brightness</label>
                <div class="slider-wrapper">
                    <input type="range" min="5" max="150" value="35" oninput="updateBrightness(this.value)">
                </div>
            </div>

            <!-- Calendar Display Mode Info -->
            <div id="datePanel" class="config-section">
                <label>Date Layout Engine</label>
                <p style="margin: 0; color: var(--text-secondary); font-size: 13px; line-height: 1.5;">
                    Automatically synchronizes with your connected device’s calendar systems to display complete date details on screen.
                </p>
            </div>

            <!-- Scroll Text Settings -->
            <div id="textPanel" class="config-section">
                <label>Message Content</label>
                <input type="text" id="scrollTextInput" placeholder="Type a custom scrolling alert...">
                <button class="btn" onclick="sendScrollText()"><i class="fa-solid fa-paper-plane"></i> Push Message</button>
            </div>

            <!-- Weather Control Panel -->
            <div id="weatherPanel" class="config-section">
                <label>Geolocated Weather State</label>
                <input type="text" id="weatherTemp" value="+25C kochi" placeholder="Format: +25C City">
                <button class="btn btn-secondary" onclick="triggerManualWeather()"><i class="fa-solid fa-location-crosshairs"></i> Refresh Weather</button>
            </div>

            <!-- Overhauled Timer Panel -->
            <div id="timerPanel" class="config-section">
                <label>Target Duration (Minutes)</label>
                <input type="number" id="timerMinutes" value="5" min="1" max="99">
                <button class="btn" onclick="controlTimer(1)"><i class="fa-solid fa-hourglass-start"></i> Sync Target Time</button>
                <div class="flex-row">
                    <button class="btn" style="background: linear-gradient(135deg, #10b981, #059669);" onclick="controlTimer(2)"><i class="fa-solid fa-play"></i> Start</button>
                    <button class="btn" style="background: linear-gradient(135deg, #f59e0b, #d97706);" onclick="controlTimer(3)"><i class="fa-solid fa-pause"></i> Pause</button>
                </div>
                <button class="btn btn-secondary" style="margin-top: 10px;" onclick="controlTimer(4)"><i class="fa-solid fa-rotate-left"></i> Reset</button>
            </div>

            <!-- Standby Settings -->
            <div id="blankPanel" class="config-section">
                <label>Standby Pipeline</label>
                <p style="margin:0; color: var(--text-secondary); font-size: 13px; line-height: 1.5;">
                    Puts the matrix screen into energy-saving standby mode.
                </p>
            </div>
            
        </div>
    </div>
</div>

<script>
const SERVICE_UUID = "4fa10001-e89b-4a9e-912c-21a7420896aa";
const CHARACTERISTIC_UUID = "4fa10002-e89b-4a9e-912c-21a7420896aa";

let bleDevice = null;
let bleChar = null;

// Mockup state tracking
let activeMode = 0;
let uiHexColor = "#00ff64";
let timerValSeconds = 300; // Default 5 mins
let timerRemainingVal = 300;
let timerRunningState = false;
let timerInterval = null;

// Clock update for emulated mockup
setInterval(() => {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    if(document.getElementById('mockupClock')) {
        document.getElementById('mockupClock').innerText = `${h}:${m}`;
    }
}, 1000);

document.getElementById('connectBtn').addEventListener('click', async () => {
    if (bleDevice && bleDevice.gatt.connected) {
        await bleDevice.gatt.disconnect();
        onDisconnected();
        return;
    }

    try {
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ services: [SERVICE_UUID] }],
            optionalServices: [SERVICE_UUID]
        });

        document.getElementById('statusText').innerText = "Connecting...";
        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        bleChar = await service.getCharacteristic(CHARACTERISTIC_UUID);

        document.getElementById('statusText').innerText = "DeskMate Connected";
        document.getElementById('statusIndicator').className = "status-dot connected";
        document.getElementById('connectBtn').innerHTML = '<i class="fa-solid fa-unlink"></i> Disconnect';
        document.getElementById('connectBtn').classList.add('btn-disconnect');
        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        // Auto Hands-free Actions on hand-shake
        await syncRtcClock();
        await fetchAndTransmitLocalWeather();

    } catch (err) {
        console.error(err);
        document.getElementById('statusText').innerText = "Failed";
    }
});

function onDisconnected() {
    bleDevice = null;
    bleChar = null;
    document.getElementById('statusText').innerText = "Offline";
    document.getElementById('statusIndicator').className = "status-dot";
    document.getElementById('connectBtn').innerHTML = '<i class="fa-solid fa-bluetooth"></i> Initialize Connection';
    document.getElementById('connectBtn').classList.remove('btn-disconnect');
}

async function writeBLE(arrayBuffer) {
    if (!bleChar) return;
    try {
        await bleChar.writeValueWithoutResponse(arrayBuffer);
    } catch (e) {
        console.error("Transmission Error:", e);
    }
}

async function syncRtcClock() {
    const now = new Date();
    const packet = new Uint8Array([
        0x04,
        now.getHours(),
        now.getMinutes(),
        now.getSeconds()
    ]);
    await writeBLE(packet);
}

// Auto weather location + open API pipeline 
async function fetchAndTransmitLocalWeather() {
    if (!navigator.geolocation) {
        transmitWeatherFallback("Kochi");
        return;
    }
    
    navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        try {
            // Get local temperature
            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const weatherData = await weatherRes.json();
            const tempVal = Math.round(weatherData.current_weather.temperature);
            
            // Retrieve locality name
            const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
            const geoData = await geoRes.json();
            const cityName = geoData.city || geoData.locality || "Local";
            
            const payload = ` +${tempVal}C ${cityName}`;
            document.getElementById('weatherTemp').value = payload.trim();
            document.getElementById('mockupWeatherLabel').innerText = payload.trim();
            
            // Transmit weather packet to DeskMate
            await transmitWeatherString(payload);
        } catch (e) {
            transmitWeatherFallback("Kochi");
        }
    }, () => {
        transmitWeatherFallback("Kochi");
    });
}

async function transmitWeatherFallback(city) {
    // Falls back to Kochi if location services are denied
    const payload = ` +25C ${city}`;
    document.getElementById('weatherTemp').value = payload.trim();
    document.getElementById('mockupWeatherLabel').innerText = payload.trim();
    await transmitWeatherString(payload);
}

async function transmitWeatherString(weatherStr) {
    const encoder = new TextEncoder();
    const textBytes = encoder.encode(weatherStr);
    const packet = new Uint8Array(2 + textBytes.length);
    packet[0] = 0x07;
    packet[1] = 0x01; // Weather Mask Id
    packet.set(textBytes, 2);
    await writeBLE(packet);
}

async function triggerManualWeather() {
    const inputVal = document.getElementById('weatherTemp').value;
    document.getElementById('mockupWeatherLabel').innerText = inputVal;
    await transmitWeatherString(inputVal);
}

async function switchMode(modeId, panelId) {
    activeMode = modeId;
    document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('.config-section').forEach(sec => sec.classList.remove('visible'));
    
    event.currentTarget.classList.add('active');
    document.getElementById(panelId).classList.add('visible');

    // Toggle interactive UI states on device mockup
    document.getElementById('mockupClock').style.display = (modeId === 0) ? "block" : "none";
    document.getElementById('mockupWeather').style.display = (modeId === 4) ? "flex" : "none";
    document.getElementById('mockupTimer').style.display = (modeId === 5) ? "flex" : "none";

    const packet = new Uint8Array([0x03, modeId]);
    await writeBLE(packet);
}

async function updateColor(hexColor) {
    uiHexColor = hexColor;
    document.getElementById('mockupClock').style.color = hexColor;
    document.getElementById('mockupClock').style.textShadow = `0 0 8px ${hexColor}`;
    
    const r = parseInt(hexColor.substr(1, 2), 16);
    const g = parseInt(hexColor.substr(3, 2), 16);
    const b = parseInt(hexColor.substr(5, 2), 16);
    const packet = new Uint8Array([0x01, r, g, b]);
    await writeBLE(packet);
}

async function updateBrightness(val) {
    const opacity = val / 150;
    document.querySelector('.matrix-screen-emulation').style.opacity = Math.max(0.3, opacity);
    const packet = new Uint8Array([0x02, parseInt(val)]);
    await writeBLE(packet);
}

async function sendScrollText() {
    const textVal = document.getElementById('scrollTextInput').value;
    const encoder = new TextEncoder();
    const rawStrBytes = encoder.encode(textVal);
    const packet = new Uint8Array(1 + rawStrBytes.length);
    packet[0] = 0x06;
    packet.set(rawStrBytes, 1);
    await writeBLE(packet);
}

async function controlTimer(actionCode) {
    const minutesSet = parseInt(document.getElementById('timerMinutes').value) || 5;
    
    if (actionCode === 1) { // Set & Stop Timer
        timerValSeconds = minutesSet * 60;
        timerRemainingVal = timerValSeconds;
        timerRunningState = false;
        clearInterval(timerInterval);
        updateMockupTimerDisplay();
    } else if (actionCode === 2) { // Start Timer
        timerRunningState = true;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timerRemainingVal > 0) {
                timerRemainingVal--;
                updateMockupTimerDisplay();
            } else {
                timerRunningState = false;
                clearInterval(timerInterval);
            }
        }, 1000);
    } else if (actionCode === 3) { // Pause Timer
        timerRunningState = false;
        clearInterval(timerInterval);
    } else if (actionCode === 4) { // Reset Timer
        timerRemainingVal = timerValSeconds;
        timerRunningState = false;
        clearInterval(timerInterval);
        updateMockupTimerDisplay();
    }

    const minHigh = (minutesSet >> 8) & 0xFF;
    const minLow = minutesSet & 0xFF;
    const packet = new Uint8Array([0x08, actionCode, minHigh, minLow, 0x00]);
    await writeBLE(packet);
}

function updateMockupTimerDisplay() {
    const min = String(Math.floor(timerRemainingVal / 60)).padStart(2, '0');
    const sec = String(timerRemainingVal % 60).padStart(2, '0');
    document.getElementById('mockupTimerDigits').innerText = `${min}:${sec}`;
    
    // Compute dynamic width of the bottom emulated progress bar
    const percentage = timerValSeconds > 0 ? (timerRemainingVal / timerValSeconds) * 100 : 0;
    document.getElementById('mockupTimerProgress').style.width = `${percentage}%`;
}
</script>
</body>
</html>
