<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATT Matrix Controller</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; max-width: 400px; margin: 0 auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input[type="text"] { width: 80%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; }
        input[type="color"] { width: 50px; height: 40px; border: none; vertical-align: middle; margin-left: 10px; cursor: pointer; }
        button { background: #007aff; border: none; color: white; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 20px; width: 85%; }
        button:hover { background: #0062cc; }
        .status { margin-top: 15px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>Matrix Canvas Node</h2>
    <div style="margin-bottom: 15px;">
        <input type="text" id="payloadText" placeholder="Enter text (e.g., Ajin Shah)">
        <input type="color" id="payloadColor" value="#00ff00">
    </div>
    <button onclick="connectAndTransmit()">Apply Changes</button>
    <div class="status" id="statusBox">Disconnected</div>
</div>

<script>
const SERVICE_UUID = "4fa10001-e89b-4a9e-912c-21a7420896aa";
const CHARACTERISTIC_UUID = "4fa10002-e89b-4a9e-912c-21a7420896aa";

let gattCharacteristic = null;

async function connectAndTransmit() {
    const statusBox = document.getElementById("statusBox");
    const textVal = document.getElementById("payloadText").value || " ";
    const colorHex = document.getElementById("payloadColor").value;
    
    // Parse hex data to integer channels
    const r = parseInt(colorHex.substring(1, 3), 16);
    const g = parseInt(colorHex.substring(3, 5), 16);
    const b = parseInt(colorHex.substring(5, 7), 16);

    try {
        if (!gattCharacteristic) {
            statusBox.innerText = "Requesting Bluetooth Matrix Device...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [SERVICE_UUID] }]
            });
            
            statusBox.innerText = "Connecting to GATT Server Layer...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            gattCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
        }

        // Construct raw payload array: [R_BYTE, G_BYTE, B_BYTE, ...TEXT_BYTES]
        const encoder = new TextEncoder();
        const textBuffer = encoder.encode(textVal);
        const packet = new Uint8Array(3 + textBuffer.length);
        packet[0] = r;
        packet[1] = g;
        packet[2] = b;
        packet.set(textBuffer, 3);

        statusBox.innerText = "Transmitting state arrays...";
        await gattCharacteristic.writeValue(packet);
        statusBox.innerText = "Synchronized successfully.";
    } catch (error) {
        statusBox.innerText = "Error: " + error.message;
        gattCharacteristic = null;
    }
}
</script>
</body>
</html>
