<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskMate Controller</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #f5f5f5;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            font-weight: bold;
        }
        button:active { background: #0056b3; }
        .control-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 16px;
        }
        #status {
            color: #ff453a;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DeskMate Controller</h2>
    <p>Control screen layouts and styling directly over BLE</p>
    
    <button id="connectBtn" onclick="connectBLE()">Connect to DeskMate</button>
    <div id="status">Disconnected</div>

    <hr style="border-color: #333; margin: 20px 0;">

    <div class="control-group">
        <label for="screenSelect">Select Screen</label>
        <select id="screenSelect" onchange="sendState()" disabled>
            <option value="0">Clock (24hr)</option>
            <option value="1">Date (16 July)</option>
        </select>
    </div>

    <div class="control-group">
        <label for="colorSelect">Screen Accent Color</label>
        <select id="colorSelect" onchange="sendState()" disabled>
            <option value="0">Default (White)</option>
            <option value="1">Crimson Red</option>
            <option value="2">Emerald Green</option>
            <option value="3">Electric Blue</option>
        </select>
    </div>
</div>

<script>
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CONTROL_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

let device = null;
let controlCharacteristic = null;

async function connectBLE() {
    const statusDiv = document.getElementById("status");
    statusDiv.textContent = "Connecting...";
    statusDiv.style.color = "#ffd60a";

    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "DeskMate-v2" }],
            optionalServices: [SERVICE_UUID]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        controlCharacteristic = await service.getCharacteristic(CONTROL_CHAR_UUID);

        statusDiv.textContent = "Connected!";
        statusDiv.style.color = "#30d158";
        document.getElementById("connectBtn").style.display = "none";
        document.getElementById("screenSelect").disabled = false;
        document.getElementById("colorSelect").disabled = false;

        device.addEventListener('gattserverdisconnected', onDisconnected);
    } catch (error) {
        console.error(error);
        statusDiv.textContent = "Connection Failed";
        statusDiv.style.color = "#ff453a";
    }
}

function onDisconnected() {
    document.getElementById("status").textContent = "Disconnected";
    document.getElementById("status").style.color = "#ff453a";
    document.getElementById("connectBtn").style.display = "block";
    document.getElementById("screenSelect").disabled = true;
    document.getElementById("colorSelect").disabled = true;
}

async function sendState() {
    if (!controlCharacteristic) return;

    const screenVal = parseInt(document.getElementById("screenSelect").value, 10);
    const colorVal = parseInt(document.getElementById("colorSelect").value, 10);

    // Build the 2-byte command: [Screen, Color]
    const payload = new Uint8Array([screenVal, colorVal]);

    try {
        await controlCharacteristic.writeValue(payload);
        console.log(`Sent Command: Screen ${screenVal}, Color ${colorVal}`);
    } catch (error) {
        console.error("Write failed: ", error);
    }
}
</script>
</body>
</html>
