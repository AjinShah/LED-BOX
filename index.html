<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskMate Controller</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --text: #fafafa;
            --accent: #10b981;
            --border: #27272a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            padding: 24px;
            text-align: center;
        }
        button {
            width: 100%;
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        select {
            width: 100%;
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
        }
        label {
            display: block;
            text-align: left;
            font-size: 12px;
            color: #a1a1aa;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: bold;
        }
        #status {
            font-weight: bold;
            margin-top: 10px;
            color: #ef4444;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DeskMate Controller</h2>
    <p style="color:#a1a1aa; font-size:14px; margin-top:-10px;">Automatic Time & Date Sync Active</p>

    <button id="connectBtn" onclick="connectBLE()">Connect to DeskMate</button>
    <div id="status">Disconnected</div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

    <label for="screenSelect">Active Screen</label>
    <select id="screenSelect" onchange="sendConfigState()" disabled>
        <option value="0">Clock Layout</option>
        <option value="1">Date Layout</option>
    </select>

    <label for="colorSelect">Matrix Color</label>
    <select id="colorSelect" onchange="sendConfigState()" disabled>
        <option value="0">Default (Green-Cyan)</option>
        <option value="1">Crimson Red</option>
        <option value="2">Emerald Green</option>
        <option value="3">Electric Blue</option>
    </select>
</div>

<script>
const SERVICE_UUID = "4fa10001-e89b-4a9e-912c-21a7420896aa";
const CHARACTERISTIC_UUID = "4fa10002-e89b-4a9e-912c-21a7420896aa";

let device = null;
let controlChar = null;

async function connectBLE() {
    const status = document.getElementById("status");
    status.textContent = "Connecting...";
    status.style.color = "#fbbf24";

    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "DeskMate" }],
            optionalServices: [SERVICE_UUID]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        controlChar = await service.getCharacteristic(CHARACTERISTIC_UUID);

        status.textContent = "Connected!";
        status.style.color = "#10b981";

        document.getElementById("connectBtn").style.display = "none";
        document.getElementById("screenSelect").disabled = false;
        document.getElementById("colorSelect").disabled = false;

        device.addEventListener('gattserverdisconnected', onDisconnected);

        // --- AUTOMATIC TIME AND DATE SYNC ON CONNECTION ---
        await syncCurrentTimeAndDate();

    } catch (error) {
        console.error(error);
        status.textContent = "Connection Failed";
        status.style.color = "#ef4444";
    }
}

function onDisconnected() {
    document.getElementById("status").textContent = "Disconnected";
    document.getElementById("status").style.color = "#ef4444";
    document.getElementById("connectBtn").style.display = "block";
    document.getElementById("screenSelect").disabled = true;
    document.getElementById("colorSelect").disabled = true;
    controlChar = null;
}

// Customizations sent to layout: Format "S[ScreenID]C[ColorID]"
async function sendConfigState() {
    if (!controlChar) return;

    const screenVal = document.getElementById("screenSelect").value;
    const colorVal = document.getElementById("colorSelect").value;
    const commandStr = `S${screenVal}C${colorVal}`;

    try {
        const encoder = new TextEncoder();
        await controlChar.writeValue(encoder.encode(commandStr));
        console.log(`Sent state packet: ${commandStr}`);
    } catch (error) {
        console.error("Write error: ", error);
    }
}

// Automatic formatting and transmission of synchronization packets
async function syncCurrentTimeAndDate() {
    if (!controlChar) return;

    const now = new Date();
    
    // 1. Hours and minutes (e.g. "1430")
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    
    // 2. Day & Month Characters
    const day = String(now.getDate()).padStart(2, '0');
    
    // Format Month code into a clean 2-letter layout (e.g. "JL" for July)
    const monthNames = ["JA", "FE", "MR", "AP", "MY", "JN", "JL", "AU", "SE", "OC", "NV", "DE"];
    const month = monthNames[now.getMonth()];
    
    // Final auto sync packet string payload: "T[HHMM]D[DDMM]" (e.g. "T1430D16JL")
    const syncPayload = `T${hours}${minutes}D${day}${month}`;

    try {
        const encoder = new TextEncoder();
        await controlChar.writeValue(encoder.encode(syncPayload));
        console.log(`Auto Sync Executed -> Sent: ${syncPayload}`);
    } catch (error) {
        console.error("Auto-sync error: ", error);
    }
}
</script>
</body>
</html>
