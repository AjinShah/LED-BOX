<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskMate Controller Platform</title>
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-surface: #1e293b;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .panel {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h2 { margin-top: 0; font-size: 1.25rem; border-bottom: 1px solid #334155; padding-bottom: 8px;}
        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #2563eb; }
        .btn-disconnect { background-color: #ef4444; }
        .btn-disconnect:hover { background-color: #dc2626; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        input[type="range"], input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 8px;
            border-radius: 6px;
        }
        .status { font-weight: bold; color: #ef4444; }
        .connected { color: #10b981; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>System Link Status</h2>
        <p>Status: <span id="statusLabel" class="status">Disconnected</span></p>
        <button id="connectBtn" class="btn" onclick="initiateBleLink()">Connect DeskMate</button>
    </div>

    <div id="controls" style="display:none;">
        <!-- Core Matrix Configuration Elements -->
        <div class="panel">
            <h2>Panel Profile Settings</h2>
            <label>Master Panel Color</label>
            <input type="color" id="panelColor" value="#00ff64" onchange="pushColorUpdate()" style="width:100%; height:40px; border:none; border-radius:6px; background:none; cursor:pointer;">
            
            <label>Active Matrix Brightness</label>
            <input type="range" id="brightnessRange" min="0" max="255" value="35" oninput="pushBrightnessUpdate()">
            
            <button class="btn" onclick="syncHardwareClock()" style="margin-top:15px; background-color:#10b981;">Sync Realtime System Clock</button>
        </div>

        <!-- Target App Interface Screen Modes -->
        <div class="panel">
            <h2>Display Screen Registry Selector</h2>
            <div class="grid">
                <button class="btn" onclick="pushDisplayMode(0)">Digital Clock</button>
                <button class="btn" onclick="pushDisplayMode(1)">Scroll Date</button>
                <button class="btn" onclick="pushDisplayMode(4)">Weather Node</button>
                <button class="btn" onclick="pushDisplayMode(5)">Timer State</button>
                <button class="btn" onclick="pushDisplayMode(2)">Clear Screen</button>
            </div>
        </div>

        <!-- System Message Registry Updates -->
        <div class="panel">
            <h2>Custom String Feed Overrides</h2>
            <label>Scrolling Text Field</label>
            <input type="text" id="scrollTextInput" placeholder="Enter custom text message...">
            <button class="btn" onclick="pushTextPayload()" style="margin-top:8px;">Transmit Text Payload</button>

            <label>Weather Override Interface (+25C Kochi)</label>
            <input type="text" id="weatherTextInput" value=" +25C Kochi">
            <button class="btn" onclick="pushWeatherPayload()" style="margin-top:8px;">Transmit Weather Asset</button>
        </div>

        <!-- Light Effect Triggers Including Target Heartbeat Modification -->
        <div class="panel">
            <h2>Dynamic Light Effect Arrays</h2>
            <div class="grid-3">
                <button class="btn" onclick="triggerLightEffect(1)">Strobe</button>
                <button class="btn" onclick="triggerLightEffect(2)">Siren</button>
                <button class="btn" onclick="triggerLightEffect(3)">Matrix</button>
                <button class="btn" onclick="triggerLightEffect(4)">Lava</button>
                <!-- Target Update Mapping for Effect ID 5: Neon Heartbeat -->
                <button class="btn" onclick="triggerLightEffect(5)" style="background-color: #ec4899;">Heartbeat</button>
                <button class="btn" onclick="triggerLightEffect(6)">Vortex</button>
                <button class="btn" onclick="triggerLightEffect(7)">Cyber</button>
                <button class="btn" onclick="triggerLightEffect(8)">Burst</button>
            </div>
        </div>
    </div>
</div>

<script>
// BLE Stack Registry IDs
const SERVICE_UUID = "4fa10001-e89b-4a9e-912c-21a7420896aa";
const CHARACTERISTIC_UUID = "4fa10002-e89b-4a9e-912c-21a7420896aa";

let targetDevice = null;
let targetCharacteristic = null;

async function initiateBleLink() {
    try {
        statusLabel.textContent = "Searching...";
        targetDevice = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'DeskMate' }],
            optionalServices: [SERVICE_UUID]
        });

        targetDevice.addEventListener('gattserverdisconnected', onBleConnectionDropped);
        const gattServer = await targetDevice.gatt.connect();
        const networkService = await gattServer.getPrimaryService(SERVICE_UUID);
        targetCharacteristic = await networkService.getCharacteristic(CHARACTERISTIC_UUID);

        statusLabel.textContent = "Connected";
        statusLabel.className = "status connected";
        connectBtn.textContent = "Disconnect Device";
        connectBtn.className = "btn btn-disconnect";
        connectBtn.setAttribute("onclick", "disconnectBleLink()");
        document.getElementById("controls").style.display = "block";
        
        // Auto Sync Clock on Handshake
        syncHardwareClock();
    } catch (err) {
        console.error(err);
        statusLabel.textContent = "Connection Failure";
        statusLabel.className = "status";
    }
}

function disconnectBleLink() {
    if (targetDevice && targetDevice.gatt.connected) {
        targetDevice.gatt.disconnect();
    }
}

function onBleConnectionDropped() {
    statusLabel.textContent = "Disconnected";
    statusLabel.className = "status";
    connectBtn.textContent = "Connect DeskMate";
    connectBtn.className = "btn";
    connectBtn.setAttribute("onclick", "initiateBleLink()");
    document.getElementById("controls").style.display = "none";
}

async function transmitPayload(bufferArray) {
    if (!targetCharacteristic) return;
    try {
        await targetCharacteristic.writeValueWithoutResponse(new Uint8Array(bufferArray));
    } catch (err) {
        console.error("Transmission fault:", err);
    }
}

function pushColorUpdate() {
    const hex = document.getElementById("panelColor").value;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    transmitPayload([0x01, r, g, b]);
}

function pushBrightnessUpdate() {
    const brightness = parseInt(document.getElementById("brightnessRange").value);
    transmitPayload([0x02, brightness]);
}

function pushDisplayMode(modeIndex) {
    transmitPayload([0x03, modeIndex]);
}

function triggerLightEffect(effectId) {
    transmitPayload([0x09, effectId]);
}

function pushTextPayload() {
    const rawText = document.getElementById("scrollTextInput").value;
    const encodeArray = new TextEncoder().encode(rawText);
    const outputBuffer = new Uint8Array(1 + encodeArray.length);
    outputBuffer[0] = 0x06; 
    outputBuffer.set(encodeArray, 1);
    transmitPayload(outputBuffer);
}

function pushWeatherPayload() {
    const rawWeather = document.getElementById("weatherTextInput").value;
    const encodeArray = new TextEncoder().encode(rawWeather);
    const outputBuffer = new Uint8Array(2 + encodeArray.length);
    outputBuffer[0] = 0x07; 
    outputBuffer[1] = 0x01; // Default to layout Condition ID 1
    outputBuffer.set(encodeArray, 2);
    transmitPayload(outputBuffer);
}

function syncHardwareClock() {
    const rightNow = new Date();
    const currentYear = rightNow.getFullYear();
    
    const payload = [
        0x04, // Sync Command
        rightNow.getHours(),
        rightNow.getMinutes(),
        rightNow.getSeconds(),
        rightNow.getDate(),
        rightNow.getDay(), 
        (currentYear >> 8) & 0xFF,
        currentYear & 0xFF,
        rightNow.getMonth() + 1 // 1-Indexed Translation Month Payload
    ];
    transmitPayload(payload);
}
</script>
</body>
</html>
